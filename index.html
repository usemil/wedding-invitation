<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Invitation</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app-container">
        
        <div id="splash-screen">
            <div class="flower-bloom">🌸</div>
            <p>Loading...</p>
        </div>

        <div id="envelope-screen" class="hidden">
            <div class="envelope-card">
                <div class="envelope-icon">✉️</div>
                <h2>You are invited</h2>
                <button id="open-btn">Tap to Open</button>
            </div>
        </div>

        <div id="main-content" class="hidden">
            <h1 id="names-display"></h1>
            <p class="subtitle">Join us in celebrating our wedding</p>
            </div>

    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
